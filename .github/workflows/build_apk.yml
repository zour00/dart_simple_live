name: 自动编译安卓APK（免签名配置）
run-name: 编译 ${{ inputs.branch || 'dev_v1.11.4' }} 分支的安卓安装包

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '要编译的分支或标签'
        required: false
        default: 'dev_v1.11.4'
        type: string
      flutter_version:
        description: 'Flutter 版本'
        required: false
        default: '3.38.3'
        type: string

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置Android SDK (包含NDK)
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            build-tools-33.0.2
            android-33
            ndk;25.2.9519653

      - name: 配置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      # 生成一个临时的 debug keystore，并设置环境变量
      # 这样 gradle 构建时就能找到签名信息，不会报 null 错误
      - name: 生成临时签名密钥
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"
          echo "KEYSTORE_PATH=${{ github.workspace }}/debug.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
          echo "KEY_ALIAS=debug" >> $GITHUB_ENV
          echo "KEY_PASSWORD=android" >> $GITHUB_ENV

      # 缓存 Gradle 文件，加速后续构建
      - name: 缓存 Gradle 文件
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 安装APP依赖
        working-directory: simple_live_app
        run: flutter pub get

      - name: 编译Release正式APK
        working-directory: simple_live_app
        run: flutter build apk --release

      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: 手机端成品APK-${{ github.run_number }}
          path: simple_live_app/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
          if-no-files-found: error
